{{define "title"}}Producten - LEONA & CRAVIT CRA Scanner{{end}}

{{define "content"}}
    <!-- Hero Section -->
    <div class="relative isolate overflow-hidden bg-gray-900">
        <svg aria-hidden="true" class="absolute inset-0 -z-10 size-full stroke-white/10 [mask-image:radial-gradient(100%_100%_at_top_right,white,transparent)]">
            <defs>
                <pattern id="hero-pattern" width="200" height="200" x="50%" y="-1" patternUnits="userSpaceOnUse">
                    <path d="M.5 200V.5H200" fill="none" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#hero-pattern)" stroke-width="0" />
        </svg>
        <div class="mx-auto max-w-7xl px-6 pb-24 pt-10 sm:pb-32 lg:px-8 lg:py-40">
            <div class="mx-auto max-w-2xl text-center">
                <h1 class="text-pretty text-5xl font-semibold tracking-tight text-white sm:text-7xl">
                    CRA Compliance Producten
                </h1>
                <p class="mt-8 text-pretty text-lg font-medium text-gray-400 sm:text-xl/8">
                    Automatische scanning en compliance tools voor embedded Linux systemen
                </p>
            </div>
        </div>
    </div>

    <!-- Feature Section 1 - Using component with data -->
    {{template "feature-grid" .Feature1}}

    <!-- Feature Section 2 - Using component with data -->
    {{template "feature-grid" .Feature2}}

    <!-- CTA Section - Using component with data -->
    {{template "cta-demo" .CTA}}
{{end}}
