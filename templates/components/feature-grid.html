{{define "feature-grid"}}
<!-- Feature Grid Section -->
<div class="overflow-hidden bg-gray-900 py-24 sm:py-32">
    <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="mx-auto grid max-w-2xl grid-cols-1 gap-x-8 gap-y-16 sm:gap-y-20 lg:mx-0 lg:max-w-none lg:grid-cols-2">
            <div class="lg:pr-8 lg:pt-4">
                <div class="lg:max-w-lg">
                    <h2 class="text-base/7 font-semibold" style="color: #FF6B35;">{{.Eyebrow}}</h2>
                    <p class="mt-2 text-pretty text-4xl font-semibold tracking-tight text-white sm:text-5xl">{{.Title}}</p>
                    <p class="mt-6 text-lg/8 text-gray-300">{{.Description}}</p>
                    <dl class="mt-10 max-w-xl space-y-8 text-base/7 text-gray-400 lg:max-w-none">
                        {{range .Features}}
                        <div class="relative pl-9">
                            <dt class="inline font-semibold text-white">
                                <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="absolute left-1 top-1 size-5" style="color: #FF6B35;">
                                    <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                                </svg>
                                {{.Title}}
                            </dt>
                            <dd class="inline">{{.Description}}</dd>
                        </div>
                        {{end}}
                    </dl>
                </div>
            </div>
            <img src="{{if .ImageUrl}}{{.ImageUrl}}{{else}}https://tailwindcss.com/plus-assets/img/component-images/dark-project-app-screenshot.png{{end}}" alt="Product screenshot" width="2432" height="1442" class="w-[48rem] max-w-none rounded-xl shadow-xl ring-1 ring-white/10 sm:w-[57rem] md:-ml-4 lg:-ml-0" />
        </div>
    </div>
</div>
{{end}}
