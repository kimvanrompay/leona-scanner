{{define "base"}}
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}LEONA CRA Scanner{{end}}</title>
    
    {{block "meta" .}}{{end}}
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX for form submissions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js for interactive components -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Tailwind Plus Elements for interactive navbar -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    
    {{block "extra_head" .}}{{end}}
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#0033A0',
                        'brand-blue-light': '#4169E1',
                    },
                    fontFamily: {
                        'sans': ['Google Sans', 'sans-serif'],
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>
    
    {{block "styles" .}}{{end}}
    
    <style>
        .google-sans-regular {
            font-family: "Google Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings: "GRAD" 0;
        }
        .google-sans-medium {
            font-family: "Google Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
            font-variation-settings: "GRAD" 0;
        }
        .google-sans-semibold {
            font-family: "Google Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 600;
            font-style: normal;
            font-variation-settings: "GRAD" 0;
        }
        .google-sans-bold {
            font-family: "Google Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 700;
            font-style: normal;
            font-variation-settings: "GRAD" 0;
        }
    </style>
</head>
<body class="bg-white antialiased text-black min-h-full flex flex-col">
    {{template "navbar" .}}
    
    <main class="flex-grow">
        {{block "content" .}}{{end}}
    </main>
    
    {{template "footer" .}}
    
    {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
