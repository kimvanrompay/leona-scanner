{{define "base"}}
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}LEONA & CRAVIT CRA Scanner{{end}}</title>
    
    {{block "meta" .}}{{end}}
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://api.fontshare.com/css?f[]=switzer@400,500,600,700&display=swap" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js for interactive components -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    {{block "extra_head" .}}{{end}}
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#0033A0',
                        'brand-blue-light': '#4169E1',
                    },
                    fontFamily: {
                        'display': ['Funnel Display', 'sans-serif'],
                        'sans': ['Iosevka Charon Mono', 'monospace'],
                        'mono': ['Iosevka Charon Mono', 'monospace'],
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>
    
    {{block "styles" .}}{{end}}
    
    <style>
        .iosevka-charon-mono-light {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 300;
            font-style: normal;
        }
        .iosevka-charon-mono-regular {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 400;
            font-style: normal;
        }
        .iosevka-charon-mono-medium {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 500;
            font-style: normal;
        }
        .iosevka-charon-mono-bold {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 700;
            font-style: normal;
        }
        .iosevka-charon-mono-light-italic {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 300;
            font-style: italic;
        }
        .iosevka-charon-mono-regular-italic {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 400;
            font-style: italic;
        }
        .iosevka-charon-mono-medium-italic {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 500;
            font-style: italic;
        }
        .iosevka-charon-mono-bold-italic {
            font-family: "Iosevka Charon Mono", monospace;
            font-weight: 700;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-white antialiased text-black min-h-full flex flex-col">
    {{template "navbar" .}}
    
    <main class="flex-grow">
        {{block "content" .}}{{end}}
    </main>
    
    {{template "footer" .}}
    
    {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
