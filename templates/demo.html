<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Aanvragen - LEONA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body class="bg-blue-50">
    <div class="isolate bg-gray-900 min-h-screen px-6 py-24 sm:py-32 lg:px-8">
        <!-- Background decoration -->
        <div aria-hidden="true"
            class="absolute inset-x-0 -top-40 -z-10 transform-gpu overflow-hidden blur-3xl sm:-top-80">
            <div style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)"
                class="relative left-1/2 -z-10 aspect-[1155/678] w-[36.125rem] max-w-none -translate-x-1/2 rotate-[30deg] bg-gradient-to-tr from-blue-600 to-blue-800 opacity-20 sm:left-[calc(50%-40rem)] sm:w-[72.1875rem]">
            </div>
        </div>

        <div class="mx-auto max-w-2xl text-center">
            <h2 class="text-balance text-4xl font-extrabold tracking-tight text-white sm:text-5xl">Demo Aanvragen</h2>
            <p class="mt-2 text-lg/8 text-gray-400">Ervaar hoe LEONA uw Linux Embedded compliance automatiseert. Ontvang
                binnen 24 uur een voorstel op maat.</p>
        </div>

        <form id="demo-form" hx-post="/api/demo/submit" hx-target="#form-messages" hx-swap="innerHTML"
            class="mx-auto mt-16 max-w-xl sm:mt-20">
            <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
                <!-- First Name -->
                <div>
                    <label for="first-name" class="block text-sm/6 font-semibold text-white">Voornaam</label>
                    <div class="mt-2.5">
                        <input required id="first-name" type="text" name="first-name"
                            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-500" />
                    </div>
                </div>

                <!-- Last Name -->
                <div>
                    <label for="last-name" class="block text-sm/6 font-semibold text-white">Achternaam</label>
                    <div class="mt-2.5">
                        <input required id="last-name" type="text" name="last-name"
                            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-500" />
                    </div>
                </div>

                <!-- Company -->
                <div class="sm:col-span-2">
                    <label for="company" class="block text-sm/6 font-semibold text-white">Bedrijfsnaam</label>
                    <div class="mt-2.5">
                        <input required id="company" type="text" name="company"
                            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-500" />
                    </div>
                </div>

                <!-- Email -->
                <div class="sm:col-span-2">
                    <label for="email" class="block text-sm/6 font-semibold text-white">Zakelijk E-mailadres</label>
                    <div class="mt-2.5">
                        <input required id="email" type="email" name="email"
                            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-500" />
                    </div>
                </div>

                <!-- Build System -->
                <div class="sm:col-span-2">
                    <label for="build-system" class="block text-sm/6 font-semibold text-white">Linux Build
                        Systeem</label>
                    <div class="mt-2.5">
                        <select id="build-system" name="build-system"
                            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-500">
                            <option value="yocto">Yocto (Bitbake)</option>
                            <option value="buildroot">Buildroot</option>
                            <option value="debian">Debian / Ubuntu Core</option>
                            <option value="custom">Custom / Anders</option>
                        </select>
                    </div>
                </div>

                <!-- Message (Optional) -->
                <div class="sm:col-span-2">
                    <label for="message" class="block text-sm/6 font-semibold text-white">Bericht (optioneel)</label>
                    <div class="mt-2.5">
                        <textarea id="message" name="message" rows="4"
                            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-500"></textarea>
                    </div>
                </div>

                <!-- Privacy Checkbox -->
                <div class="flex gap-x-4 sm:col-span-2">
                    <div class="flex h-6 items-center">
                        <div
                            class="group relative inline-flex w-8 shrink-0 rounded-full bg-white/5 p-px ring-1 ring-inset ring-white/10 has-[:checked]:bg-blue-500 transition-colors duration-200">
                            <span
                                class="size-4 rounded-full bg-white shadow-sm ring-1 ring-gray-900/5 transition-transform group-has-[:checked]:translate-x-3.5"></span>
                            <input required id="agree" type="checkbox" name="agree"
                                class="absolute inset-0 size-full appearance-none" />
                        </div>
                    </div>
                    <label for="agree" class="text-sm/6 text-gray-400">
                        Ik ga akkoord met de opslag van mijn gegevens voor deze demo-aanvraag.
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="mt-10">
                <button type="submit" id="submit-btn"
                    class="block w-full rounded-md bg-blue-600 px-3.5 py-2.5 text-center text-sm font-bold text-white shadow-sm hover:bg-blue-500 transition-all">
                    Verzend Demo Aanvraag
                </button>
            </div>

            <!-- Messages -->
            <div id="form-messages" class="mt-4"></div>
        </form>

        <!-- Back to Home -->
        <div class="mt-8 text-center">
            <a href="/" class="text-sm font-bold text-gray-300 hover:text-blue-400 transition-colors">
                ← Terug naar home
            </a>
        </div>
    </div>
</body>

</html>

<!-- Messages -->
<div id="form-messages" class="mt-4"></div>
</form>
</div>
{{end}}
